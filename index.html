<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piedra, papel o tijera - game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Inline:opsz,wght@10..72,100..900&family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <script src="./js/main.js" defer></script>
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">Piedra, papel o tijera contra A.U.R.A.</h1>
      <p class="header__text">
        (Absolutely Unbeatable Rock-paper-scissors Algorithm)
      </p>
    </header>

    <main class="main">
      <form class="js__gameForm main__form hidden">
        <label class="main__text-choose-play" for="choose-play"
          >Escoge tu arma sabiamente:</label
        >
        <div class="main__container-choose-play">
          <select
            class="js__playerMove main__select-choose-play"
            name="choose-play"
            id="choose-play"
          >
            <option value="default-value">Seleccione su jugada</option>
            <option value="rock">Piedra 🪨​</option>
            <option value="paper">Papel 🧻</option>
            <option value="scissors">Tijeras ✂️</option>
          </select>
          <button
            class="js__choosePlayBtn main__choose-play-btn btn"
            type="submit"
          >
            Jugar
          </button>
        </div>
      </form>

      <button class="js__startGameBtn main__start-btn btn">
        ¡DESAFIAR A A.U.R.A!
      </button>

      <p class="js__matchResult main__results paragraph__styles">foo</p>

      <div class="counters">
        <p class="counters__player-counter paragraph__styles">foo</p>
        <p class="counters__machine-counter paragraph__styles">foo</p>
      </div>

      <p class="js__auraComments aura__comments paragraph__styles"></p>
    </main>

    <footer>
      <p>© 2026 Cris · Desarrollado por una humana. Supervisado por A.U.R.A.</p>
    </footer>
  </body>
</html>
